<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Learn About Open Source</title>
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #f5f2eb;
        --text: #1a1a1a;
        --accent: #c0392b;
        --muted: #888;
        --border: #d4cfc6;
      }

      body {
        background-color: var(--bg);
        color: var(--text);
        font-family: "IBM Plex Sans", sans-serif;
        font-weight: 300;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      /* NAV */
      header {
        border-bottom: 1px solid var(--border);
        padding: 1.2rem 2rem;
      }

      nav ul {
        list-style: none;
        display: flex;
        gap: 2rem;
      }

      nav ul li {
        font-family: "IBM Plex Mono", monospace;
        font-size: 0.8rem;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
        cursor: pointer;
        transition: color 0.2s;
      }

      nav ul li:first-child {
        color: var(--accent);
      }

      nav ul li:hover {
        color: var(--text);
      }

      /* MAIN */
      main {
        flex: 1;
        display: flex;
        align-items: center;
        padding: 4rem 2rem;
        max-width: 680px;
        margin: 0 auto;
        width: 100%;
      }

      .content {
        border-left: 2px solid var(--accent);
        padding-left: 1.5rem;
      }

      .label {
        font-family: "IBM Plex Mono", monospace;
        font-size: 0.7rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 0.8rem;
      }

      h1 {
        font-size: 2rem;
        font-weight: 300;
        line-height: 1.3;
        margin-bottom: 1rem;
        letter-spacing: -0.02em;
      }

      h1 span {
        font-weight: 600;
      }

      p {
        font-size: 1rem;
        line-height: 1.7;
        color: #444;
      }
    </style>
  </head>
  <body>
    <header>
      <nav>
        <ul>
          <li>Home</li>
          <li>About us</li>
          <li>Contact us</li>
        </ul>
      </nav>
    </header>
    <main>
      <div class="content">
        <p class="label">Getting started</p>
        <h1>Learn to make a <span>pull request</span></h1>
        <p>
          Open source starts with a single contribution. Fork a repo, make your
          change, and open a pull request — it's simpler than you think.
        </p>
      </div>
    </main>
  </body>
</html>
